# MAGNETISM — Supabase project config
# Linked to project: ocsrmgneyttdkingkiev
#
# This file is used by the Supabase CLI when running `supabase functions ...`
# commands locally. Production deploys target the project via --project-ref.

project_id = "magnetism-app"

# magnetism-chat requires a signed-in caller — JWT verification stays on
# (this is the default; no [functions.magnetism-chat] override needed).

# magnetism-corpus-seed is called by ops/admin from CLI, not by end-user
# JWTs. It disables Supabase's JWT gate and enforces its own bearer check
# against SUPABASE_SERVICE_ROLE_KEY inside the function.
[functions.magnetism-corpus-seed]
verify_jwt = false

# magnetism-memory-refresh is called either by cron (via pg_net) or by
# ops/admin from CLI. Same admin-only pattern as corpus-seed.
[functions.magnetism-memory-refresh]
verify_jwt = false
